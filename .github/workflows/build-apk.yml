name: Build MNN Chat APK

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 ndk;27.2.12479018 cmake;3.22.1'

      - name: Cache Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          validate-wrappers: false

      - name: Build MNN native libs
        working-directory: project/android
        run: |
          mkdir -p build_64
          cd build_64
          ../build_64.sh \
            -DMNN_LOW_MEMORY=true \
            -DMNN_CPU_WEIGHT_DEQUANT_GEMM=true \
            -DMNN_BUILD_LLM=true \
            -DMNN_SUPPORT_TRANSFORMER_FUSE=true \
            -DMNN_ARM82=true \
            -DMNN_USE_LOGCAT=true \
            -DMNN_OPENCL=true \
            -DLLM_SUPPORT_VISION=true \
            -DMNN_BUILD_OPENCV=true \
            -DMNN_IMGCODECS=true \
            -DLLM_SUPPORT_AUDIO=true \
            -DMNN_BUILD_AUDIO=true \
            -DMNN_BUILD_DIFFUSION=ON \
            -DMNN_SEP_BUILD=OFF \
            -DBUILD_PLUGIN=ON \
            -DCMAKE_INSTALL_PREFIX=.
          make -j$(nproc) install

      - name: Build APK
        working-directory: apps/Android/MnnLlmChat
        run: |
          ./gradlew assembleStandardDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mnn-chat-debug
          path: apps/Android/MnnLlmChat/app/build/outputs/apk/standard/debug/*.apk
